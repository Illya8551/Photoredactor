<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Web Photo Editor</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#222;
color:white;
display:flex;
height:100vh;
}

#toolbar{
width:220px;
background:#333;
padding:10px;
overflow:auto;
}

#toolbar button{
width:100%;
margin:4px 0;
padding:6px;
}

#toolbar input{
width:100%;
margin:4px 0;
}

#canvasContainer{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#111;
overflow:hidden;
}

canvas{
background:white;
cursor:crosshair;
}

.layer{
background:#444;
margin:4px 0;
padding:4px;
cursor:pointer;
}

.layer.active{
background:#666;
}

</style>
</head>

<body>

<div id="toolbar">

<h3>Инструменты</h3>

<button onclick="setTool('brush')">Кисть</button>
<button onclick="setTool('eraser')">Ластик</button>
<button onclick="setTool('fill')">Заливка</button>
<button onclick="setTool('rect')">Прямоугольник</button>
<button onclick="setTool('circle')">Круг</button>
<button onclick="setTool('line')">Линия</button>

<hr>

<label>Цвет</label>
<input type="color" id="color" value="#000000">

<label>Размер</label>
<input type="range" id="size" min="1" max="50" value="5">

<hr>

<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>

<hr>

<input type="file" id="upload">

<button onclick="save()">Скачать PNG</button>

<hr>

<h3>Слои</h3>

<div id="layers"></div>

<button onclick="addLayer()">+ слой</button>

<hr>

<label>Zoom</label>
<input type="range" min="0.2" max="3" step="0.1" value="1" id="zoom">

</div>

<div id="canvasContainer">

<canvas id="canvas" width="1000" height="600"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let tool="brush"
let drawing=false

let startX,startY

let history=[]
let redoStack=[]

let zoom=1

const colorPicker=document.getElementById("color")
const sizePicker=document.getElementById("size")

const layers=[]
let currentLayer=0

function setTool(t){
tool=t
}

function saveState(){

history.push(canvas.toDataURL())

if(history.length>50)
history.shift()

}

function undo(){

if(history.length==0) return

redoStack.push(canvas.toDataURL())

let img=new Image()
img.src=history.pop()

img.onload=()=>{

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(img,0,0)

}

}

function redo(){

if(redoStack.length==0) return

let img=new Image()
img.src=redoStack.pop()

img.onload=()=>{

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(img,0,0)

}

}

canvas.addEventListener("mousedown",e=>{

drawing=true

startX=e.offsetX
startY=e.offsetY

saveState()

if(tool==="fill"){
floodFill(startX,startY)
drawing=false
}

})

canvas.addEventListener("mousemove",e=>{

if(!drawing) return

const x=e.offsetX
const y=e.offsetY

ctx.lineWidth=sizePicker.value

if(tool==="brush"){

ctx.strokeStyle=colorPicker.value
ctx.lineCap="round"

ctx.lineTo(x,y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y)

}

if(tool==="eraser"){

ctx.strokeStyle="white"
ctx.lineCap="round"

ctx.lineTo(x,y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y)

}

})

canvas.addEventListener("mouseup",e=>{

drawing=false

const x=e.offsetX
const y=e.offsetY

ctx.strokeStyle=colorPicker.value

if(tool==="rect"){

ctx.strokeRect(startX,startY,x-startX,y-startY)

}

if(tool==="circle"){

const r=Math.sqrt(
Math.pow(x-startX,2)+
Math.pow(y-startY,2)
)

ctx.beginPath()
ctx.arc(startX,startY,r,0,Math.PI*2)
ctx.stroke()

}

if(tool==="line"){

ctx.beginPath()
ctx.moveTo(startX,startY)
ctx.lineTo(x,y)
ctx.stroke()

}

})

function floodFill(x,y){

const img=ctx.getImageData(0,0,canvas.width,canvas.height)

const data=img.data

const stack=[[x,y]]

while(stack.length){

const pos=stack.pop()

const px=pos[0]
const py=pos[1]

const index=(py*canvas.width+px)*4

data[index]=0
data[index+1]=0
data[index+2]=0
data[index+3]=255

if(px>0) stack.push([px-1,py])
if(px<canvas.width-1) stack.push([px+1,py])
if(py>0) stack.push([px,py-1])
if(py<canvas.height-1) stack.push([px,py+1])

}

ctx.putImageData(img,0,0)

}

document.getElementById("upload").onchange=e=>{

const file=e.target.files[0]

const img=new Image()

img.onload=()=>{

ctx.drawImage(img,0,0)

}

img.src=URL.createObjectURL(file)

}

function save(){

const link=document.createElement("a")

link.download="image.png"

link.href=canvas.toDataURL()

link.click()

}

function addLayer(){

layers.push({})

renderLayers()

}

function renderLayers(){

const div=document.getElementById("layers")

div.innerHTML=""

layers.forEach((l,i)=>{

const el=document.createElement("div")

el.className="layer"+(i===currentLayer?" active":"")

el.textContent="Layer "+(i+1)

el.onclick=()=>{

currentLayer=i
renderLayers()

}

div.appendChild(el)

})

}

document.getElementById("zoom").oninput=e=>{

zoom=e.target.value

canvas.style.transform="scale("+zoom+")"

}

addLayer()

</script>

</body>
</html>
